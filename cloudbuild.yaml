# Cloud Build configuration for gke-eda-orders
# Deploys to GKE (Google Kubernetes Engine)

substitutions:
  _REGION: europe-west1
  _GKE_CLUSTER: eda-cluster
  _NAMESPACE: orders
  _APP_NAME: gke-eda-orders

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Step 1: Pull previous image for layer cache
  - name: 'gcr.io/cloud-builders/docker'
    id: pull-cache
    entrypoint: bash
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/${_APP_NAME}:latest || true']

  # Step 2: Build Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    waitFor: ['pull-cache']
    args:
      - 'build'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/${_APP_NAME}:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_APP_NAME}:${SHORT_SHA}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_APP_NAME}:latest'
      - '.'

  # Step 3: Push image with SHORT_SHA tag
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    waitFor: ['build']
    args: ['push', 'gcr.io/$PROJECT_ID/${_APP_NAME}:${SHORT_SHA}']

  # Step 4: Push latest tag for cache
  - name: 'gcr.io/cloud-builders/docker'
    id: push-latest
    waitFor: ['build']
    args: ['push', 'gcr.io/$PROJECT_ID/${_APP_NAME}:latest']

  # Step 5: Get GKE credentials
  - name: 'gcr.io/cloud-builders/gcloud'
    id: get-credentials
    waitFor: ['push']
    args:
      - 'container'
      - 'clusters'
      - 'get-credentials'
      - '${_GKE_CLUSTER}'
      - '--region'
      - '${_REGION}'
      - '--project'
      - '$PROJECT_ID'

  # Step 6: Apply Kubernetes manifests
  - name: 'gcr.io/cloud-builders/kubectl'
    id: apply-manifests
    waitFor: ['get-credentials']
    args:
      - 'apply'
      - '-f'
      - 'k8s/'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=${_REGION}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_GKE_CLUSTER}'

  # Step 7: Update deployment image
  - name: 'gcr.io/cloud-builders/kubectl'
    id: deploy
    waitFor: ['apply-manifests']
    args:
      - 'set'
      - 'image'
      - 'deployment/orders'
      - 'orders=gcr.io/$PROJECT_ID/${_APP_NAME}:${SHORT_SHA}'
      - '-n'
      - '${_NAMESPACE}'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=${_REGION}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_GKE_CLUSTER}'

  # Step 8: Wait for rollout
  - name: 'gcr.io/cloud-builders/kubectl'
    id: rollout-status
    waitFor: ['deploy']
    args:
      - 'rollout'
      - 'status'
      - 'deployment/orders'
      - '-n'
      - '${_NAMESPACE}'
      - '--timeout=300s'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=${_REGION}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_GKE_CLUSTER}'
