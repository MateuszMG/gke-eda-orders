# Why to use tag ----> enable first trigger on cloud build (because ':latest' does not exists yet), for debugging (wee see 'gcp-products-service:3d4ffc9' )
# _FOLDER_NAME + _APP_NAME ----> are useful for multiple services/jobs in one repository ------------------------------------------------>but useless if we have only one service/job

# #
# # Step types (each step runs a container; 'name' = image):
# #   Build:    gcr.io/cloud-builders/docker, gcr.io/cloud-builders/npm, gcr.io/cloud-builders/gcloud
# #   Test:     run tests in same or custom image (e.g. node:22-alpine + npm test)
# #   Lint:     custom image or script (e.g. biome, eslint)
# #   Deploy:   gcr.io/google.com/cloudsdktool/cloud-sdk (gcloud run deploy, app deploy, etc.)
# #   Notify:   curl/slack, or use gcr.io/cloud-builders/gcloud (pub/sub)
# #   Secrets:  gcr.io/google.com/cloudsdktool/cloud-sdk to fetch from Secret Manager
# #   Any:      any Docker image from GCR, Artifact Registry, or Docker Hub (e.g. node:22-alpine)
# # Use 'id' and 'waitFor' to order steps. Workspace is /workspace (clone lives there if you use a repo trigger).


substitutions:
  _REGION: europe-west1

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Step 1: Pull previous image for layer cache (skip on first deploy)
  - name: 'gcr.io/cloud-builders/docker'
    id: pull-cache
    entrypoint: bash
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/$REPO_NAME:latest || true']

  # Step 2: Build Docker Image (reuses layers from pull-cache)
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    waitFor: ['pull-cache']
    args:
      - 'build'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/$REPO_NAME:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/$REPO_NAME:${SHORT_SHA}'
      - '.'

  # Step 3: Push image (required for deploy)
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    waitFor: ['build']
    args: ['push', 'gcr.io/$PROJECT_ID/$REPO_NAME:${SHORT_SHA}']

  # Step 4: Deploy to Cloud Run (use SHORT_SHA for traceability)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: deploy
    waitFor: ['push']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $REPO_NAME
      - --image
      - gcr.io/$PROJECT_ID/$REPO_NAME:${SHORT_SHA}
      - --region
      - $_REGION
      - '--set-secrets'
      - 'DB_POSTGRESQL_NAME=DB_POSTGRESQL_NAME:latest,DB_POSTGRESQL_PASSWORD=DB_POSTGRESQL_PASSWORD:latest,DB_POSTGRESQL_HOST=DB_POSTGRESQL_HOST:latest,JWT_SECRET=JWT_SECRET:latest,JWT_ACCESS_EXPIRY=JWT_ACCESS_EXPIRY:latest,JWT_REFRESH_EXPIRY=JWT_REFRESH_EXPIRY:latest,REDIS_HOST=REDIS_HOST:latest'
      - '--set-env-vars'
      - 'TZ=Europe/Warsaw'
      - '--set-env-vars'
      - 'NODE_ENV=${_NODE_ENV}'

  # Step 5: Tag and push latest for next build's cache (runs after push, in parallel with deploy)
  - name: 'gcr.io/cloud-builders/docker'
    waitFor: ['push']
    entrypoint: bash
    args:
      - '-c'
      - |
        docker tag gcr.io/$PROJECT_ID/$REPO_NAME:${SHORT_SHA} gcr.io/$PROJECT_ID/$REPO_NAME:latest
        docker push gcr.io/$PROJECT_ID/$REPO_NAME:latest
